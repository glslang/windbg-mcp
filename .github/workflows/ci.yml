name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        # Pinned to a master-history SHA (per the action's README — toolchain
        # branch commits get force-pushed), so the toolchain comes from the
        # input, not the ref.
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

      - name: Validate plugin manifests
        shell: pwsh
        run: |
          # Guard against malformed plugin/marketplace manifests (the JSON that
          # tells the marketplace how to install this plugin).
          foreach ($f in '.claude-plugin/plugin.json', '.claude-plugin/marketplace.json') {
            Write-Host "Validating $f"
            Get-Content $f -Raw | ConvertFrom-Json | Out-Null
          }

  docs:
    name: Documentation lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@992badcdf24e3b8eb7e87ff9287fe931bcb00c6e # v20
        with:
          globs: |
            README.md
            CHANGELOG.md
            docs/**/*.md
            skills/**/*.md

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Soft-warn: a freshly-disclosed advisory in a transitive dependency should
    # surface here without blocking unrelated PRs.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install cargo-audit
        # Pinned to a SHA, so the tool comes from the input, not the ref.
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit
